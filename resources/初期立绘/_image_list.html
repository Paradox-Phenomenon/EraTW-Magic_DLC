<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image List</title>
    <style>
        /* 现有的 CSS 样式，保持不变 */
        :root {
            font-size: 20px;
        }

        body {
            display: grid;
            place-items: center;
            background-color: #f5f5dc;
            transition: background-color 0.3s ease;
        }

        body.night-mode {
            background-color: #333;
        }

        * {
            margin: 0;
            padding: 0;
        }

        ul {
            display: grid;
            place-items: center;
            gap: 0rem; /* 去除 ul 的 gap，实现无间隔 */
        }

        li {
            list-style: none;
            min-height: auto;
            width: 100%;
            display: block; /* 确保 li 占据整行 */
            margin: 0;
            padding: 0;
        }

        body.night-mode li { /* 夜间模式下 li 的样式，目前为空 */ }

        img {
            max-width: 100%;
            display: block; /* 移除图片下方间隙 */
            border-radius: 0;
            margin-left: auto;
            margin-right: auto;
        }

        #toolBar {
            font-size: 0.7rem;
            height: auto;
            line-height: 2em;
            display: flex;
            /* 修改 justify-content 为 center，使内容居中 */
            justify-content: center;
            align-items: center;
            margin-bottom: 1rem;
            padding: 1rem 0.5rem; /* 增加一些顶部和底部的 padding，让工具栏显得更舒展 */
            flex-wrap: wrap;
            gap: 1rem; /* 增加一些 gap，让工具栏元素之间更宽松 */
            box-sizing: border-box;
            width: 100%;
            max-width: 40rem;
            background-color: #f0f0e0;
            border-radius: 0.5rem;
        }

        body.night-mode #toolBar {
            background-color: #222; /* 或者其他适合夜间模式的颜色 */
            color: #eee; /* 同时更改文字颜色，以便在深色背景下可见 */
        }

        #toolBar > div:first-child {
            flex-grow: 0; /* 修改 flex-grow 为 0，避免滑块占据过多空间 */
            min-width: 24rem;
            display: flex;
            align-items: center;
            gap: 0.75rem; /* 稍微增加滑块和百分比文字之间的间距 */
        }

        #toolBar > div:last-child {
            display: flex;
            gap: 0.5rem; /* 稍微增加按钮之间的间距 */
            align-items: center;
        }

        #toolBar input[type="range"] {
            width: 50%;
            min-width: 5rem;
            vertical-align: middle;
        }

        #vpPercent {
            display: inline-block;
            padding: 0.2em 0.5em;
            border-radius: 1em;
            background-color: #e0e0c8; /* 米白色稍深 */
            color: #333;
            font-size: 0.7rem;
            line-height: 1;
            text-align: center;
            white-space: nowrap;
            font-family: sans-serif; /* 无衬线字体 */
            font-weight: bold; /* 粗体 */
        }

        body.night-mode #vpPercent {
            background-color: #4a4a4a; /* 灰黑色稍深 */
            color: #eee;
        }


        #nightModeIcon {
            font-size: 1.2rem;
            cursor: pointer;
            user-select: none;
        }

        #nightModeIcon {
            color: #333;
            transition: color 0.3s ease;
        }

        body.night-mode #nightModeIcon {
            color: #eee;
        }

        /*  双页模式 CSS 样式 (保留) */
        body.double-page-mode ul {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /*  两列布局  */
            grid-gap: 0rem; /*  移除图片间距 */
        }

        body.double-page-mode li {
            width: 100%; /*  确保 li 占据网格单元的宽度  */
        }

        /*  新的空白页模式 CSS 样式  */
        body.blank-page-mode ul {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /*  两列布局 */
            grid-gap: 0rem; /*  移除图片间距 */
        }


        body.blank-page-mode ul > li:first-child {
            grid-column: 1 / span 2; /*  让第一张 li 占据两列的宽度 */
            margin-left: 50%; /* 将第一张图的 li 整体向右移动 50% 的宽度 */
            box-sizing: border-box; /* 确保 padding 和 border 不会增加元素总宽度 */
            padding-left: 0%; /*  抵消 margin-left 的影响，让图片内容从左侧开始 */
        }

        body.blank-page-mode ul > li:first-child > img {
            width: 100%; /*  确保图片宽度不超过容器宽度 */
            max-width: 100%; /*  防止图片超出父元素 */
            margin-left: -50%; /*  将图片内容向左拉回 50%，实现左侧空白页效果 */
            display: block; /* 移除图片下方间隙 */
        }


        #bookPageIcon {
            font-size: 1.2rem;
            cursor: pointer;
            user-select: none;
            color: #333;
            transition: color 0.3s ease;
        }

        body.night-mode #bookPageIcon {
            color: #eee;
        }


    </style>
</head>

    <script>
        const imgs = document.querySelectorAll("[data-src]");
        let observer = new IntersectionObserver(
            (entries) => {
                entries.forEach((item) => {
                    if (item.isIntersecting) {
                        item.target.src = item.target.dataset.src;
                        observer.unobserve(item.target);
                    }
                });
            },
            {
                rootMargin: "0px",
                threshold: 0.1,
            }
        );
        imgs.forEach((item) => observer.observe(item));

        const setVp = (val) => {
            document.querySelector("#list").style.width = `${val}%`;
        };
        const showVp = (val) => {
            document.querySelector("#vpPercent").innerText = `${val}%`;
        };

        // 夜间模式切换功能 (保留)
        const nightModeIcon = document.getElementById('nightModeIcon');
        nightModeIcon.addEventListener('click', () => {
            document.body.classList.toggle('night-mode');
            if (document.body.classList.contains('night-mode')) {
                nightModeIcon.textContent = '🌙';
            } else {
                nightModeIcon.textContent = '💡';
            }
        });

        //  书页模式切换功能
        const bookPageIcon = document.getElementById('bookPageIcon');
        const list = document.getElementById('list'); // 获取 ul 元素
        let bookPageMode = 0; // 0: 单页, 1: 双页, 2: 空白页双页
        let originalListItems = Array.from(list.children); //  保存原始的 li 顺序

        bookPageIcon.addEventListener('click', () => {
            bookPageMode = (bookPageMode + 1) % 3; // 循环切换模式
            updateBookPageMode();
        });

        function updateBookPageMode() {
            document.body.classList.remove('double-page-mode', 'blank-page-mode'); // 移除之前的模式 class

            if (bookPageMode === 0) {
                bookPageIcon.textContent = '📖'; // 单页模式图标
                resetListOrder(); // **先恢复原始顺序**
            } else if (bookPageMode === 1) {
                bookPageIcon.textContent = '📚'; // 双页模式图标
                document.body.classList.add('double-page-mode');
                resetListOrder(); // **先恢复原始顺序**
                reverseListOrderForDoublePage();
            } else if (bookPageMode === 2) {
                bookPageIcon.textContent = '📃'; // 空白页双页模式图标
                document.body.classList.add('blank-page-mode');
                resetListOrder(); // **先恢复原始顺序**
                reverseListOrderFromSecondItem();
            }
        }


        function reverseListOrderForDoublePage() {
            const list = document.getElementById('list');
            const items = Array.from(list.children);
            const images = items;
            const reversedItems = [];

            for (let i = 0; i < images.length; i += 2) {
                if (images[i + 1]) {
                    reversedItems.push(images[i + 1]);
                }
                reversedItems.push(images[i]);
            }

            list.innerHTML = '';
            reversedItems.forEach(item => list.appendChild(item));
        }

        function reverseListOrderFromSecondItem() {
            const list = document.getElementById('list');
            const items = Array.from(list.children);

            if (items.length <= 1) return;

            const firstItem = items[0];
            const remainingItems = items.slice(1);
            const reversedItems = [];

            for (let i = 0; i < remainingItems.length; i += 2) {
                const item1 = remainingItems[i];
                const item2 = remainingItems[i + 1];

                if (item2) {
                    reversedItems.push(item2); // 先添加偶数索引的 (左侧)
                    reversedItems.push(item1); // 再添加奇数索引的 (右侧)
                } else {
                    reversedItems.push(item1); // 如果只有 item1，直接添加
                }
            }

            list.innerHTML = '';
            list.appendChild(firstItem); //  先添加第一个 li 元素
            reversedItems.forEach(item => list.appendChild(item)); //  然后添加重排序后的剩余列表项
        }


        function resetListOrder() {
            const list = document.getElementById('list');
            list.innerHTML = '';
            originalListItems.forEach(item => list.appendChild(item.cloneNode(true)));
            originalListItems = Array.from(list.children); // 更新 originalListItems
        }


        //  初始化时保存原始列表项 (确保在事件监听器之前)
        originalListItems = Array.from(list.children);
    </script>
</body>
